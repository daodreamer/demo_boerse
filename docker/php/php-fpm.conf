; PHP-FPM www pool — Docker configuration

[global]
; Route PHP-FPM global logs to stderr (Docker log driver)
error_log = /proc/self/fd/2

[www]
user = appuser
group = appgroup

; Listen on all interfaces so Nginx can reach PHP-FPM across the Docker network
listen = 9000
listen.owner = appuser
listen.group = appgroup

; Dynamic process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500

; CRITICAL: do not clear environment variables before starting worker processes.
; Without this, APP_SECRET, DATABASE_URL, and all Docker-injected env vars
; would be invisible to Symfony.
clear_env = no

; Route PHP worker logs to stderr (Docker log driver)
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Catch workers output (stdout/stderr from PHP scripts) and log it
catch_workers_output = yes
decorate_workers_output = no
