server {
    listen 80;
    listen [::]:80;

    # Nginx serves the built React SPA from its own web root.
    # public/index.php lives in the PHP-FPM container — Nginx never executes PHP.
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for text assets
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options          "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options   "nosniff"                       always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block"                 always;

    # Vite-hashed assets (filenames contain content hash) — cache forever
    location ~* /assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static public assets (non-hashed, shorter TTL)
    location ~* \.(svg|ico|png|jpg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API routes → Symfony (PHP-FPM in the 'php' Docker service)
    location /api {
        try_files $uri /index.php$is_args$args;
    }

    # PHP execution via FastCGI
    # SCRIPT_FILENAME points to the PHP container's filesystem, not Nginx's web root.
    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param REQUEST_SCHEME   $scheme;
        fastcgi_param HTTPS            $https if_not_empty;

        # Timeouts suitable for Symfony cold starts
        fastcgi_read_timeout 60s;
        fastcgi_connect_timeout 10s;

        internal;
    }

    # Frontend SPA — serve static files, fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny all hidden files except .well-known (e.g. ACME challenges)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
