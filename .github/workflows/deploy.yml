name: Deploy to Azure

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip, opcache

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          cp -r frontend/dist/* public/

      - name: Commit build artifacts for Azure
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add -f vendor/ public/
          git diff --staged --quiet || git commit -m "ci: build artifacts [skip ci]"

      - name: Push to Azure LocalGit
        run: |
          AZURE_USER=$(echo "${{ secrets.AZURE_GIT_USER }}" | sed 's/\$/%24/g')
          git remote add azure "https://${AZURE_USER}:${{ secrets.AZURE_GIT_PASSWORD }}@boersedemo-g9c8bth2gchhgect.eastasia-01.azurewebsites.net/boersedemo.git"
          git push azure HEAD:master --force
