doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        dbal:
            # TiDB Cloud Serverless requires SSL (TLS 1.2+).
            # PDO MySQL constant integers (PHP enum, PDO_ATTR_DRIVER_SPECIFIC=1000):
            #   1011 = PDO::MYSQL_ATTR_SSL_CA        (the CA cert to verify server)
            #   1016 = PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT (false = skip chain verify)
            # startup.sh prints actual values: "=== PDO SSL constant values ==="
            options:
                1011: '%kernel.project_dir%/config/ssl/isrgrootx1.pem'
                1016: false
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
